<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>:timer_clock:</title>
</head>

<body>
    <section class="container">
        <div class="timer">
            <div id="time" class="spant"></div>
        </div>
        <button onclick="start()" id="start" class="timer-btn">Start</button>
        <button onclick="pause()" id="pause" class="pause-btn">Pause</button>
        <button onclick="stop()" id="stop" class="timer-btn">Stop</button>
    </section>
</body>
<script src="index.js"></script>

</html>
